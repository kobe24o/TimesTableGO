name: Build APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Restore release signing keystore
        if: github.event_name != 'pull_request'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::Missing ANDROID_KEYSTORE_BASE64 secret. Add release signing secrets before publishing APK."
            exit 1
          fi
          mkdir -p app/keystore
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > app/keystore/release.jks

      - name: Build signed release APK
        if: github.event_name != 'pull_request'
        env:
          SIGNING_KEYSTORE_PATH: keystore/release.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$SIGNING_STORE_PASSWORD" ] || [ -z "$SIGNING_KEY_ALIAS" ] || [ -z "$SIGNING_KEY_PASSWORD" ]; then
            echo "::error::Missing one or more signing secrets: ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD."
            exit 1
          fi
          gradle :app:assembleRelease --no-daemon

      - name: Build debug APK
        if: github.event_name == 'pull_request'
        run: gradle :app:assembleDebug --no-daemon

      - name: Prepare APK
        run: |
          mkdir -p release
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            cp app/build/outputs/apk/debug/*.apk release/multiplication-coach-debug.apk
          else
            cp app/build/outputs/apk/release/*.apk release/multiplication-coach-release.apk
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: multiplication-coach-apk
          path: release/*.apk
          if-no-files-found: error

      - name: Publish APK to GitHub Release
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: Latest Debug APK
          body: |
            自动构建的固定签名 release APK。

            Source commit: ${{ github.sha }}
          artifacts: release/multiplication-coach-release.apk
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
