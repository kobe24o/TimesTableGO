name: Build APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Build debug APK
        run: gradle :app:assembleDebug --no-daemon

      - name: Prepare release APK
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/*.apk release/multiplication-coach-debug.apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: multiplication-coach-debug-apk
          path: release/multiplication-coach-debug.apk
          if-no-files-found: error

      - name: Publish APK to GitHub Release
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: Latest Debug APK
          body: |
            自动构建的 debug APK。

            Source commit: ${{ github.sha }}
          artifacts: release/multiplication-coach-debug.apk
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
